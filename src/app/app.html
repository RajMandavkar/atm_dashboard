<mat-toolbar class="toolbar">
  <span><img style="width: 25px;" src="favicon.ico"> ATM Dashboard Design</span>
</mat-toolbar>

<div class="container">
  <mat-card class="main-card">
    <div class="balance-box">
      CURRENT BALANCE: ${{ balance() | number: "1.2-2" }}
    </div>

    <p class="section-title">DEPOSIT / CREDIT</p>

    <div class="form">
      <mat-form-field appearance="outline">
        <input
          matInput
          placeholder="Enter Amount"
          [ngModel]="amount()"
          (ngModelChange)="amount.set($event)"
        />
      </mat-form-field>

      <button mat-raised-button color="primary" (click)="submitTransaction()">
        SUBMIT
      </button>
    </div>

    <div class="toggle-card">
      <span>DEPOSIT</span>

      <mat-slide-toggle
        [ngModel]="isCredit()"
        (ngModelChange)="isCredit.set($event)"
      >
      </mat-slide-toggle>

      <span>CREDIT</span>
    </div>

    <!-- Transactions -->
    <div class="table-card">
      <h3>Recent Transactions</h3>

      <table mat-table [dataSource]="transactions()">
        <ng-container matColumnDef="date">
          <th mat-header-cell *matHeaderCellDef>Date</th>
          <td mat-cell *matCellDef="let t">{{ t.date }}</td>
        </ng-container>

        <ng-container matColumnDef="desc">
          <th mat-header-cell *matHeaderCellDef>Description</th>
          <td mat-cell *matCellDef="let t">{{ t.desc }}</td>
        </ng-container>

        <ng-container matColumnDef="amount">
          <th mat-header-cell *matHeaderCellDef class="right">Amount</th>
          <td mat-cell *matCellDef="let t" class="right">
            ${{ t.amount | number: "1.2-2" }}
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="columns"></tr>
        <tr mat-row *matRowDef="let row; columns: columns"></tr>
      </table>
    </div>

    <div class="footer">
      <div>
        Welcome, User.<br />
        Please select a transaction.
      </div>
      <div class="angular-logo"><img style="width: 175px;" src="angular.png"></div>

    </div>
  </mat-card>
</div>
